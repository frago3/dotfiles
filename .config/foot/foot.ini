# -*- conf -*-
# vim: filetype=yaml :
# vim: syntax=yaml :

term=xterm-256color
font=monospace:size=11
line-height=18px
font-size-adjustment=1
initial-window-size-pixels=1170x1060
pad=8x8

[main]
include=/usr/share/foot/themes/kitty

[scrollback]
indicator-position=none
indicator-format=none

[url]
launch=brave ${url}

[mouse]
hide-when-typing=no
# alternate-scroll-mode=yes
[cursor]
color=1a1a1a 9fd5f5
