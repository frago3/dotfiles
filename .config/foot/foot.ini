# -*- conf -*-
# vim: filetype=yaml :
# vim: syntax=yaml :

term=xterm-256color
initial-window-size-pixels=1162x1062
pad=14x8
font=monospace:size=11

[scrollback]
indicator-position=none
indicator-format=none

[url]
launch=chromium ${url}

[key-bindings]
scrollback-up-page=Shift+KP_Prior
scrollback-down-page=Shift+KP_Next
# spawn-terminal=Control+Shift+Return

[cursor]
unfocused-style=none
color=1a1a1a 9fd5f5

[colors]
foreground=d0d0d0
background=000000
regular0=000000  # black
regular1=cc0403  # red
regular2=19cb00  # green
regular3=cecb00  # yellow
regular4=0d73cc  # blue
regular5=cb1ed1  # magenta
regular6=0dcdcd  # cyan
regular7=dddddd  # white
bright0=767676   # bright black
bright1=f2201f   # bright red
bright2=23fd00   # bright green
bright3=fffd00   # bright yellow
bright4=1a8fff   # bright blue
bright5=fd28ff   # bright magenta
bright6=14ffff   # bright cyan
bright7=ffffff   # bright white
