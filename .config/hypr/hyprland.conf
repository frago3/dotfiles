# This is an example Hyprland config file.
#
# Refer to the wiki for more information.

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# See https://wiki.hyprland.org/Configuring/Monitors/
# monitor=,preferred,auto,auto
monitor=eDP-1,1920x1080@60,0x0,1

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
# Execute your favorite apps at launch
exec-once=waybar & gebaard -b

# Some default env vars.
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland # GTK
env = MOZ_ENABLE_WAYLAND,1 # firefox
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = SDL_VIDEODRIVER,wayland

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = latam
    follow_mouse = 2

    touchpad {
        natural_scroll = true
        scroll_factor = 0.4
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 0
    gaps_out = 0
    border_size = 1
    # col.active_border = rgb(2a2a2a)
    col.active_border = rgb(000000)
    col.inactive_border = rgb(000000)

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 0
    blur {
        enabled = false
    }
    drop_shadow = false
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 3, myBezier
    animation = windowsOut, 1, 3, default, popin 80%
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3, default
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = false
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    disable_autoreload = false
    force_default_wallpaper = 0	
    disable_hyprland_logo = true
    disable_splash_rendering = true
    animate_manual_resizes = false
    background_color = rgb(00807F)
    vfr = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = sppt2600:00-0911:5288-touchpad
    sensitivity = 0.2
}

# Example windowrule v2
windowrulev2 = float, class:.*
windowrulev2 = maxsize 1918 1057, class:.*

# size: 1378,1056 at: 271,1
windowrulev2 = center 1, class:^(foot|org.pwmt.zathura)$
# windowrulev2 = center 1, class:^(org.pwmt.zathura)$

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = SUPER, RETURN, exec,          foot
bind = SUPER SHIFT, RETURN, exec,    foot -e tmux
bind = SUPER, W, exec,               firefox
bind = SUPER SHIFT, W, exec,         firefox --private-window
bind = SUPER, E, exec,               pcmanfm-qt

bind = CTRL SHIFT, Q, killactive,
bind = SUPER, M, exec, killall gebaard
bind = SUPER, M, exit,

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# 1920 1060
bind = SUPER CTRL, escape, resizeactive, exact 1918 1057
bind = SUPER CTRL, escape, moveactive, exact 1 1
# resize window
bind = SUPER CTRL, right,   resizeactive, 270 0
bind = SUPER CTRL, left,    resizeactive, -270 0
bind = SUPER CTRL, up,      resizeactive, 0 -270
bind = SUPER CTRL, down,    resizeactive, 0 270

bind = SUPER, kp_home, moveactive, exact 1 1
bind = SUPER, kp_prior, exec, ~/.config/hypr/scripts/hypr_move.sh -righttop
bind = SUPER, kp_end, exec, ~/.config/hypr/scripts/hypr_move.sh -leftbottom
bind = SUPER, kp_next, exec, ~/.config/hypr/scripts/hypr_move.sh -rightbottom
bind = SUPER, escape, centerwindow, 1

bind = SUPER, right,    moveactive, 270 0
bind = SUPER, left,     moveactive, -270 0
bind = SUPER, up,       moveactive, 0 -270
bind = SUPER, down,     moveactive, 0 270

# Scroll through existing workspaces with mainMod + scroll
bind = CTRL ALT, left,  workspace, e-1
bind = CTRL ALT, right, workspace, e+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow

# to switch between windows in a floating workspace
bind = ALT, Tab, exec, ~/.config/hypr/scripts/hypr_lastwindow.sh

bind = CTRL ALT, up, exec, ~/.config/hypr/scripts/bemenu_window.sh
bind = SUPER, space, exec, ~/.config/hypr/scripts/bemenu_run.sh

# mkeys
bind =, XF86AudioRaiseVolume, exec,  ~/.config/hypr/scripts/mkeys_volume.sh -up
bind =, XF86AudioLowerVolume, exec,  ~/.config/hypr/scripts/mkeys_volume.sh -down
bind =, XF86AudioMute, exec,         ~/.config/hypr/scripts/mkeys_volume.sh -mute
bind =, XF86MonBrightnessUp, exec,   ~/.config/hypr/scripts/mkeys_light.sh -up
bind =, XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/mkeys_light.sh -down

bind=SUPER, backspace, exec, dunstctl close 

bind=SUPER, P,submap,status
submap=status
# sets repeatable binds 
bind =, c, exec, ~/.local/bin/status_calendar.sh
bind =, c, submap,reset 
bind =, f, exec, ~/.local/bin/status_fetch.sh
bind =, f, submap,reset 
bind =, p, exec, ~/.local/bin/status_ps.sh
bind =, p, submap,reset 
bind =, w, exec, ~/.local/bin/status_wifi.sh
bind =, w, submap,reset 
bind =,escape,submap,reset 
submap=reset
