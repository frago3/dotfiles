# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = eDP-1,1920x1080@60,0x0,1


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = waybar -c ~/.config/hypr/waybar/config.jsonc -s ~/.config/hypr/waybar/style.css


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    # col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 0

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow:enabled = false

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur:enabled = false
    dim_special = 0
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations:enabled = no

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    background_color = 0x574C91
    disable_splash_rendering = true
    vfr = true
}

xwayland:enabled = false

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = latam
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    touchpad:natural_scroll = true
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures:workspace_swipe = false

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = sppt2600:00-0911:5288-touchpad
    sensitivity = 0
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
# $mainMod = SUPER # Sets "Windows" key as main modifier
$script = ~/.local/bin
# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = SUPER, Q, exec, foot
bind = SUPER, W, exec, chromium
bind = SUPER Shift, W, exec, chromium --incognito
bind = SUPER, E, exec, pcmanfm-qt

bind = SUPER, Plus, exec, $script/menu_find.sh
bind = SUPER, Tab, exec, $script/hypr_windows.sh
bind = SUPER, R, exec, $script/menu_drun.sh
bind = SUPER, L, exec, hyprlock
bind = SUPER, KP_End, togglefloating,

bind = SUPER, Return, layoutmsg, swapwithmaster
bind = SUPER, M, exit,
bind = Control Shift, Q, killactive,
bind = SUPER, BackSpace, exec, dunstctl close

# Move focus with mainMod + arrow keys
bind = SUPER, Left, movefocus, l
bind = SUPER, Left, alterzorder, top
bind = SUPER, Right, movefocus, r
bind = SUPER, Right, alterzorder, top
bind = SUPER, Up, movefocus, u
bind = SUPER, Up, alterzorder, top
bind = SUPER, Down, movefocus, d  
bind = SUPER, Down, alterzorder, top

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER, KP_Home, workspace, empty
bind = SUPER, KP_Prior, workspace, e-1
bind = SUPER, KP_Next, workspace, e+1

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspacesilent, 1
bind = SUPER SHIFT, 2, movetoworkspacesilent, 2
bind = SUPER SHIFT, 3, movetoworkspacesilent, 3
bind = SUPER SHIFT, 4, movetoworkspacesilent, 4
bind = SUPER SHIFT, 5, movetoworkspacesilent, 5
bind = SUPER SHIFT, 6, movetoworkspacesilent, 6
bind = SUPER SHIFT, 7, movetoworkspacesilent, 7
bind = SUPER SHIFT, 8, movetoworkspacesilent, 8
bind = SUPER SHIFT, 9, movetoworkspacesilent, 9
bind = SUPER SHIFT, 0, movetoworkspacesilent, 10

# Example special workspace (scratchpad)
bind = Alt, Tab, togglespecialworkspace, J
bind = Alt, S, movetoworkspace, special:J
bind = Alt, S, togglespecialworkspace, J

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
# bindm = SUPER, mouse:273, resizewindow

bind = Alt Shift, Up, resizeactive, 0 -120
bind = Alt Shift, Down, resizeactive, 0 120
bind = Alt Shift, Left, resizeactive, -120 0
bind = Alt Shift, Right, resizeactive, 120 0

bind = SUPER Shift, Escape, centerwindow, 1
bind = SUPER Shift, Right, moveactive, 120 0
bind = SUPER Shift, Left, moveactive, -120 0
bind = SUPER Shift, Up, moveactive, 0 -120
bind = SUPER Shift, Down, moveactive, 0 120
bind = SUPER Shift, KP_Home, exec, $script/hypr_snap.sh -topleft
bind = SUPER Shift, KP_End, exec, $script/hypr_snap.sh -bottomleft
bind = SUPER Shift, KP_Prior, exec, $script/hypr_snap.sh -topright
bind = SUPER Shift, KP_Next, exec, $script/hypr_snap.sh -bottomright

# # Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, $script/mkeys_volume.sh -up
bindel = ,XF86AudioLowerVolume, exec, $script/mkeys_volume.sh -down
bindel = ,XF86AudioMute, exec, $script/mkeys_volume.sh -mute
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, $script/mkeys_light.sh -up
bindel = ,XF86MonBrightnessDown, exec, $script/mkeys_light.sh -down

bind = SUPER, P, exec, dunstify -r 1 '' "c o p f w"
bind = SUPER, P, submap, status
submap = status

binde = , C, exec, $script/status_calendar.sh
binde = , C, submap, reset
binde = , O, exec, $script/status_core.sh
binde = , O, submap, reset
binde = , P, exec, $script/status_ps.sh
binde = , P, submap, reset
binde = , F, exec, $script/status_fetch.sh
binde = , F, submap, reset
binde = , W, exec, $script/status_wifi.sh
binde = , W, submap, reset

bind = , Escape, exec, dunstctl close
bind = , Escape, submap, reset
submap = reset

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
windowrulev2 = maxsize 1920 1060, floating:1

# Ignore maximize requests from apps. You'll probably like this.
# windowrulev2 = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
# windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

